name: Gitnub Action test No 1.

# main branch에 push되면 실행하겠다
on:
  push:
    branches:
      - main

jobs:
  My-Deploy-Job:
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Action 내장 변수 사용
        run: | 
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY

      - name: Hello World 출력
        run: echo "Hello World"

      - name: 여러개 명령어 추가하기
        run: | 
          echo "Good"
          echo "Morning"